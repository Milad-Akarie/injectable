name: injectable_generator
description: Injectable is a convenient code generator for get_it. Inspired by Angular DI, Guice DI and inject.dart.
version: 3.0.1
homepage: https://github.com/Milad-Akarie/injectable

environment:
  sdk: ">=3.8.0<4.0.0"

dependencies:
  build: ^4.0.4
  source_gen: ^4.1.1
  path: ^1.9.0
  glob: ^2.1.3
  analyzer: ">=10.0.0 <13.0.0"
  code_builder: ^4.11.0
  dart_style: ^3.1.4
  lean_builder: ^0.1.9
  injectable: ^3.0.0
    #  path: ../injectable
  collection: ^1.18.0
  recase: ^4.1.0
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.10.4
  build_test: ^3.5.4
  test: ^1.28.0
  lints: ^6.0.0
  coverage: ^1.15.0
